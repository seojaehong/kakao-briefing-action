name: Kakao Business Briefing

on:
  workflow_dispatch:
    inputs:
      briefing_mode:
        description: "am or pm"
        required: true
        default: "am"
      dry_run:
        description: "true or false"
        required: true
        default: "true"
  schedule:
    - cron: "30 22 * * 0-4"
    - cron: "30 8 * * 1-5"

jobs:
  briefing:
    runs-on: ubuntu-latest
    env:
      GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
      KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
      KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
      WEATHER_LAT: ${{ vars.WEATHER_LAT }}
      WEATHER_LON: ${{ vars.WEATHER_LON }}
      WEATHER_LOCATION_NAME: ${{ vars.WEATHER_LOCATION_NAME }}
      KAKAO_TEMPLATE_WEB_URL: ${{ vars.KAKAO_TEMPLATE_WEB_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate required secrets
        shell: bash
        run: |
          for name in GOOGLE_TOKEN_JSON ANTHROPIC_API_KEY KAKAO_REST_API_KEY KAKAO_REFRESH_TOKEN KAKAO_CLIENT_SECRET; do
            if [ -z "${!name}" ]; then
              echo "Missing secret: $name"
              exit 1
            fi
          done

      - name: Select mode
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "briefing_mode=${{ github.event.inputs.briefing_mode }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 8 * * 1-5" ]; then
            echo "briefing_mode=pm" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "briefing_mode=am" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run briefing
        shell: bash
        run: |
          mkdir -p logs
          EXTRA_ARGS=""
          if [ "${{ steps.mode.outputs.dry_run }}" = "true" ]; then
            EXTRA_ARGS="--dry-run"
          fi
          python main.py --mode "${{ steps.mode.outputs.briefing_mode }}" $EXTRA_ARGS 2>&1 | tee logs/run.log

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: briefing-logs
          path: |
            logs/
            artifacts/
